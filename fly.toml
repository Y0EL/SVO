# fly.toml app configuration file generated for svo on 2026-06-12T13:41:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'svo'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOWED_HOSTS = 'svo.fly.dev'
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
